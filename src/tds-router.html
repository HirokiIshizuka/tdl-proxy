<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDSパークルーター｜最短全制覇ナビ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Mochiy+Pop+One&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#003087;--blue-lt:#1A6FC4;--gold:#FFC72C;--gold-dk:#C9960C;
  --red:#E8002D;--teal:#0990A0;--teal-lt:#14B8CC;--teal-dk:#076878;
  --volcano:#C04018;--paper:#fff;
  --base:#E8F5FA;--ink:#1A1A1A;--ink-soft:#5A5A6A;
  --coral:#FF6B5E;--sunny:#FFC247;
  --line:#C8DDE8;
  --shadow:0 10px 30px -12px rgba(0,80,120,.22);
  --shadow-sm:0 4px 14px -6px rgba(0,80,120,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--base);color:var(--ink);font-family:"Noto Sans JP",sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100vh;padding:0 0 60px}

/* HEADER */
header{
  background:linear-gradient(150deg,#001830 0%,#003850 45%,#0A6888 100%);
  padding:26px 20px 22px;text-align:center;
  position:relative;overflow:hidden;
  box-shadow:0 4px 24px rgba(0,56,80,.55);
}
.hdr-waves{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.hdr-waves::before,.hdr-waves::after{
  content:"〜 ✦ 〜 ✦ 〜 ✦ 〜 ✦ 〜 ✦ 〜 ✦ 〜 ✦ 〜 ✦ 〜 ✦ 〜 ✦ 〜 ✦";
  position:absolute;color:rgba(20,184,204,.3);font-size:11px;letter-spacing:14px;white-space:nowrap;width:220%;
}
.hdr-waves::before{top:8px;animation:slidewaves 22s linear infinite}
.hdr-waves::after{bottom:6px;animation:slidewaves 28s linear infinite reverse;opacity:.6}
@keyframes slidewaves{from{transform:translateX(0)}to{transform:translateX(-50%)}}

.sea-icon{display:block;margin:0 auto 10px;position:relative}
.logo{
  font-family:"Zen Maru Gothic",sans-serif;font-weight:900;
  font-size:clamp(24px,6vw,40px);letter-spacing:1px;color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,.45);position:relative;
}
.logo em{color:#14B8CC;font-style:normal}
.tag{margin-top:6px;color:rgba(255,255,255,.72);font-size:13px;font-weight:500;position:relative}

/* NAV SWITCH */
.park-nav{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  border-radius:999px;display:inline-flex;gap:2px;padding:3px;
  margin-top:14px;position:relative;
}
.park-nav a{
  color:rgba(255,255,255,.7);font-size:12px;font-weight:700;text-decoration:none;
  padding:6px 14px;border-radius:999px;transition:background .15s,color .15s;
}
.park-nav a.active{background:#fff;color:#003850}
.park-nav a:not(.active):hover{color:#fff;background:rgba(255,255,255,.15)}

.wrap{max-width:960px;margin:0 auto;padding:0 16px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:20px 0 16px}
.stat{
  background:var(--paper);border:1.5px solid var(--line);border-radius:18px;
  padding:13px 10px;text-align:center;box-shadow:var(--shadow-sm);
  position:relative;overflow:hidden;
}
.stat::after{content:"";position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--teal-lt))}
.stat.hl::after{background:linear-gradient(90deg,var(--volcano),#FF6B5E)}
.stat .num{font-family:"Mochiy Pop One",sans-serif;font-size:clamp(17px,4.5vw,26px);line-height:1}
.stat .num small{font-size:.55em;color:var(--ink-soft)}
.stat .lbl{margin-top:6px;font-size:11px;color:var(--ink-soft);font-weight:700}
.stat.hl .num{color:var(--volcano)}

/* MAP + HERO */
.map-hero{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;align-items:start}
@media(max-width:680px){.map-hero{grid-template-columns:1fr}}

.map-wrap{background:var(--paper);border:1.5px solid var(--line);border-radius:22px;padding:14px;box-shadow:var(--shadow-sm)}
.map-wrap h4{font-family:"Zen Maru Gothic";font-weight:700;font-size:13px;color:var(--teal);text-align:center;margin-bottom:10px;letter-spacing:.3px}
#park-map{width:100%;height:auto;display:block;border-radius:10px}
.map-legend{display:flex;flex-wrap:wrap;gap:5px 10px;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--ink-soft);font-weight:700}
.legend-swatch{width:10px;height:10px;border-radius:3px;flex:none}

/* HERO */
.hero{
  background:linear-gradient(140deg,#001830 0%,#003850 55%,#0A6888 100%);
  border-radius:22px;padding:20px;box-shadow:var(--shadow);color:#fff;
  position:relative;overflow:hidden;min-height:280px;
}
.hero::before{content:"";position:absolute;right:-20px;top:-20px;width:110px;height:110px;background:radial-gradient(circle,rgba(20,184,204,.45),transparent 70%)}
.hero::after{content:"";position:absolute;left:-15px;bottom:-15px;width:80px;height:80px;background:radial-gradient(circle,rgba(255,255,255,.07),transparent 70%)}
.hero .kicker{
  display:inline-flex;align-items:center;gap:7px;position:relative;
  background:#14B8CC;color:#001830;font-weight:800;font-size:11px;
  padding:5px 12px;border-radius:999px;letter-spacing:.6px;
}
.hero .pin{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pulse 1.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,199,44,.7)}70%{box-shadow:0 0 0 8px rgba(255,199,44,0)}100%{box-shadow:0 0 0 0 rgba(255,199,44,0)}}
.hero h2{font-family:"Zen Maru Gothic",sans-serif;font-weight:900;font-size:clamp(17px,4vw,24px);margin:12px 0 4px;line-height:1.25;color:#fff;position:relative}
.hero .land-tag{color:rgba(255,255,255,.65);font-size:12px;font-weight:700;position:relative}
.hero .metrics{display:flex;gap:18px;margin-top:14px;flex-wrap:wrap;position:relative}
.hero .metric .v{font-family:"Mochiy Pop One",sans-serif;font-size:22px;line-height:1;color:#fff}
.hero .metric .v.wait{color:#14B8CC}
.hero .metric .v.walk{color:#FFD080}
.hero .metric .k{font-size:10px;color:rgba(255,255,255,.6);font-weight:700;margin-top:5px}
.hero .why{margin-top:12px;font-size:12px;color:rgba(255,255,255,.82);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:11px;padding:9px 12px;position:relative;line-height:1.6}
.hero .act{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;position:relative}

/* BUTTONS */
.btn{font-family:"Noto Sans JP";font-weight:700;border:none;border-radius:13px;padding:11px 17px;font-size:13px;cursor:pointer;transition:transform .12s,box-shadow .12s}
.btn:active{transform:translateY(1px)}
.btn-primary{background:#14B8CC;color:#001830;font-weight:900;box-shadow:0 5px 14px -5px rgba(7,104,120,.55)}
.btn-primary:hover{background:#20C8DC;box-shadow:0 8px 18px -5px rgba(7,104,120,.65)}
.btn-ghost{background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.32)}
.btn-ghost:hover{background:rgba(255,255,255,.28)}

/* CONTROLS */
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:18px 0 8px}
.ctrl-btn{
  font-family:"Noto Sans JP";font-weight:700;font-size:13px;
  border:1.5px solid var(--line);border-radius:13px;padding:10px 15px;
  cursor:pointer;background:var(--paper);color:var(--ink);
  box-shadow:var(--shadow-sm);transition:transform .12s,box-shadow .12s;
}
.ctrl-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.ctrl-btn.teal{background:var(--teal);color:#fff;border-color:var(--teal);box-shadow:0 5px 14px -5px var(--teal-dk)}
.sliderbox{display:flex;align-items:center;gap:8px;background:var(--paper);border:1.5px solid var(--line);border-radius:13px;padding:8px 13px;box-shadow:var(--shadow-sm)}
.sliderbox label{font-size:12px;font-weight:700;color:var(--ink-soft)}
input[type=range]{accent-color:var(--teal);width:85px}
.updated{font-size:11px;color:var(--ink-soft);margin-left:auto;font-weight:600}

/* SECTION */
.sec{margin:26px 0 12px;display:flex;align-items:center;gap:10px}
.sec h3{font-family:"Zen Maru Gothic",sans-serif;font-weight:900;font-size:16px;color:var(--teal);white-space:nowrap}
.sec .bar{flex:1;height:2px;background:repeating-linear-gradient(90deg,var(--teal-lt) 0 5px,transparent 5px 10px)}

/* ROUTE PLAN */
.plan{background:var(--paper);border:1.5px solid var(--line);border-radius:20px;padding:8px;box-shadow:var(--shadow-sm)}
.step{display:flex;align-items:center;gap:13px;padding:10px 12px;border-radius:13px}
.step+.step{border-top:1px solid var(--line)}
.step .ord{flex:none;width:31px;height:31px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--teal-lt));color:#fff;font-family:"Mochiy Pop One";font-size:14px;display:grid;place-items:center;box-shadow:0 3px 8px rgba(0,120,150,.3)}
.step .nm{flex:1;min-width:0}
.step .nm b{font-size:14px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.step .nm span{font-size:11px;color:var(--ink-soft)}
.step .tm{text-align:right;font-size:12px;color:var(--ink-soft);white-space:nowrap}
.step .tm b{font-family:"Mochiy Pop One";font-size:15px;color:var(--teal);display:block}

/* ATTRACTION LIST */
.lands-wrap{display:flex;flex-direction:column;gap:16px}
.land-card .land-h{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.land-card .dot{width:12px;height:12px;border-radius:4px;flex:none}
.land-card .land-h b{font-family:"Zen Maru Gothic";font-weight:700;font-size:15px}
.land-card .land-h span{font-size:11px;color:var(--ink-soft)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:9px}
.ride{background:var(--paper);border:1.5px solid var(--line);border-radius:15px;padding:12px;display:flex;flex-direction:column;gap:8px;transition:transform .15s,box-shadow .15s,opacity .2s;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.ride:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.ride.done{opacity:.45;background:#EAF5F8}
.ride.closed{opacity:.55;border-style:dashed}
.ride .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.ride .rn{font-size:13px;font-weight:700;line-height:1.3}
.ride .wait-box{flex:none;text-align:center;min-width:48px}
.ride .wait-box .w{font-family:"Mochiy Pop One";font-size:18px;line-height:1}
.ride .wait-box .w.low{color:var(--teal)}.ride .wait-box .w.mid{color:var(--sunny)}.ride .wait-box .w.high{color:var(--coral)}
.ride .wait-box .u{font-size:9px;color:var(--ink-soft);margin-top:2px}
.ride .meta{font-size:11px;color:var(--ink-soft);display:flex;gap:6px;flex-wrap:wrap}
.ride .chip{background:var(--base);border:1px solid var(--line);border-radius:999px;padding:2px 7px}
.ride .ridebtn{margin-top:2px;border:none;border-radius:10px;padding:9px;font-weight:700;font-size:12px;cursor:pointer;background:linear-gradient(135deg,var(--teal),var(--teal-lt));color:#fff;transition:opacity .15s}
.ride .ridebtn:hover{opacity:.85}
.ride.done .ridebtn{background:linear-gradient(135deg,#888,#AAA)}
.closetag{font-size:10px;color:var(--volcano);font-weight:700}

footer{margin-top:32px;text-align:center;font-size:11px;color:var(--ink-soft);line-height:1.8}
footer a{color:var(--teal);font-weight:700;text-decoration:none}
@media(max-width:480px){.stats{grid-template-columns:repeat(2,1fr)}.sliderbox{display:none}}
</style>
</head>

  8027:"indiana",   8046:"raging",    8033:"steam_lr",
  13560:"rapunzel", 13559:"frozen",   13561:"peterpan", 13562:"tinker",
  8039:"sindbad",   8030:"magiclamp", 8040:"caravan",   8025:"jasmine",  8045:"whirlpool",
  8041:"flounder",  8044:"blowfish",  8022:"ariel",     8043:"jellyfish",8042:"scuttle",  8026:"mermaid_th",
  8028:"journey",   8029:"leagues",   8049:"leonardo",
};

async function fetchLiveWaits(){
  const res = await fetch(PROXY_URL,{cache:"no-store"});
  if(!res.ok) throw new Error(res.status);
  const data = await res.json();
  const rides = data.rides?.length ? data.rides : data.lands.flatMap(l=>l.rides);
  rides.forEach(r=>{
    const a = state.find(x=>x.id===QT_ID_TO_LOCAL[r.id]);
    if(!a) return;
    a.open = r.is_open;
    a.wait = r.wait_time ?? 0;
  });
}

let state = ATTR.map(a=>({...a, wait:a.base, open:true, done:false}));
let curPos = {...ENTRANCE};
let walkWeight = 1.0;
let parkOpenMin = 9*60;
let simClock = 0;

const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const walkMin=(from,to)=>Math.max(1,Math.round(dist(from,to)*0.22));
function waitClass(w){ return w<20?"low":w<45?"mid":"high"; }
function fmtClock(min){ const t=parkOpenMin+min,h=Math.floor(t/60)%24,m=Math.round(t%60); return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`; }

function simulateWaits(){
  const curve = 0.55+0.8*Math.exp(-Math.pow((simClock/60-3.5)/3,2));
  state.forEach(a=>{
    if(!a.open) return;
    a.wait = Math.max(5,Math.round(a.base*curve*(0.7+Math.random()*0.6)/5)*5);
  });
}

function cost(from,a){ return a.wait+walkMin(from,a)*walkWeight; }
function nextBest(from,pool){
  let best=null,bc=Infinity;
  pool.forEach(a=>{ if(a.done||!a.open) return; const c=cost(from,a); if(c<bc){bc=c;best=a;} });
  return best;
}
function buildPlan(){
  const plan=[]; let pos={...curPos}; let clock=simClock;
  const pending=state.filter(a=>!a.done&&a.open);
  while(pending.length){
    let best=null,bc=Infinity,bi=-1;
    pending.forEach((a,i)=>{ const c=cost(pos,a); if(c<bc){bc=c;best=a;bi=i;} });
    const w=walkMin(pos,best);
    plan.push({...best,walk:w,atClock:clock+w});
    clock+=w+best.wait+best.dur;
    pos={x:best.x,y:best.y};
    pending.splice(bi,1);
  }
  return {plan, total:clock-simClock};
}

/* ===== MAP ===== */
const MX=x=>x*3.5, MY=y=>y*3.3;

const ZONES = {
  med:     {cx:48,cy:77, rx:13,ry:10},
  american:{cx:77,cy:70, rx:12,ry:12},
  port:    {cx:80,cy:51, rx:10,ry:9},
  lost:    {cx:70,cy:38, rx:11,ry:9},
  springs: {cx:51,cy:23, rx:13,ry:8},
  arabian: {cx:32,cy:51, rx:11,ry:10},
  mermaid: {cx:22,cy:66, rx:9, ry:9},
  mystery: {cx:47,cy:58, rx:8, ry:7},
};

const LAND_SHORT = {
  med:"地中海港",american:"AW",port:"PD",
  lost:"ロストリバー",springs:"ファンタジーS",
  arabian:"アラビアン",mermaid:"マーメイド",mystery:"ミステリアス",
};

function renderMap(){
  const next = nextBest(curPos, state);
  let h = "";

  // Gradient defs
  h += `<defs>
    <radialGradient id="seaGrad" cx="50%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#A8D8F0"/>
      <stop offset="100%" stop-color="#80B8E0"/>
    </radialGradient>
    <radialGradient id="harborGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5599CC"/>
      <stop offset="100%" stop-color="#3377AA"/>
    </radialGradient>
    <radialGradient id="lavaGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FF8040"/>
      <stop offset="100%" stop-color="#802000"/>
    </radialGradient>
  </defs>`;

  // Sea background
  h += `<rect width="350" height="330" fill="url(#seaGrad)" rx="10"/>`;

  // Park land mass (green oval)
  h += `<ellipse cx="162" cy="185" rx="130" ry="145" fill="#B8D898" stroke="#90B870" stroke-width="1.5"/>`;

  // Inner harbor water (Mediterranean Harbor)
  h += `<ellipse cx="172" cy="250" rx="45" ry="32" fill="url(#harborGrad)" stroke="#4488BB" stroke-width="1.5"/>`;
  // Harbor waves
  h += `<ellipse cx="172" cy="250" rx="38" ry="25" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="1"/>`;
  h += `<ellipse cx="172" cy="250" rx="28" ry="17" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="1"/>`;

  // Main entrance path
  h += `<rect x="157" y="270" width="26" height="55" fill="#D8CEBA" opacity="0.7" rx="3"/>`;

  // Land zones
  Object.entries(ZONES).forEach(([lk,z])=>{
    const col = LANDS[lk].color;
    h += `<ellipse cx="${MX(z.cx)}" cy="${MY(z.cy)}" rx="${z.rx*3.5}" ry="${z.ry*3.3}" fill="${col}" opacity="0.28" stroke="${col}" stroke-width="1.2" stroke-opacity="0.5"/>`;
    h += `<text x="${MX(z.cx)}" y="${MY(z.cy)+4}" text-anchor="middle" font-size="7.5" fill="${col}" font-weight="700" font-family="'Noto Sans JP',sans-serif">${LAND_SHORT[lk]}</text>`;
  });

  // Mt. Prometheus (Mysterious Island) at x:42, y:60 → SVG (147, 198)
  const vx=MX(42), vy=MY(60);
  h += `<polygon points="${vx},${vy-32} ${vx-22},${vy+8} ${vx+22},${vy+8}" fill="#802010" opacity="0.85"/>`;
  h += `<polygon points="${vx},${vy-32} ${vx-12},${vy-10} ${vx+12},${vy-10}" fill="#C03010" opacity="0.9"/>`;
  // Lava glow at peak
  h += `<ellipse cx="${vx}" cy="${vy-32}" rx="6" ry="5" fill="url(#lavaGrad)" opacity="0.9"/>`;
  h += `<text x="${vx}" y="${vy+20}" text-anchor="middle" font-size="7" fill="#802010" font-weight="700" font-family="'Noto Sans JP',sans-serif">プロメテウス火山</text>`;

  // Attraction dots
  state.forEach(a=>{
    const sx=MX(a.x), sy=MY(a.y);
    const col = LANDS[a.land].color;
    const isNext = next && next.id===a.id;

    if(a.done){
      h += `<circle cx="${sx}" cy="${sy}" r="5" fill="#AAAAAA" stroke="#888" stroke-width="1"/>`;
      h += `<line x1="${sx-3}" y1="${sy-3}" x2="${sx+3}" y2="${sy+3}" stroke="#fff" stroke-width="1.4"/>`;
      h += `<line x1="${sx+3}" y1="${sy-3}" x2="${sx-3}" y2="${sy+3}" stroke="#fff" stroke-width="1.4"/>`;
    } else if(!a.open){
      h += `<circle cx="${sx}" cy="${sy}" r="4.5" fill="${col}" opacity="0.3" stroke="${col}" stroke-width="1" stroke-dasharray="2,2"/>`;
    } else if(isNext){
      h += `<circle cx="${sx}" cy="${sy}" r="14" fill="${col}" opacity="0.2">
        <animate attributeName="r" values="10;15;10" dur="1.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.25;0.08;0.25" dur="1.6s" repeatCount="indefinite"/>
      </circle>`;
      h += `<circle cx="${sx}" cy="${sy}" r="9" fill="#FFC72C" stroke="#fff" stroke-width="2.5"/>`;
      h += `<text x="${sx}" y="${sy+3.5}" text-anchor="middle" font-size="6.5" fill="#1A1A1A" font-weight="900" font-family="'Noto Sans JP',sans-serif">NEXT</text>`;
    } else {
      const wc = waitClass(a.wait);
      const dotCol = a.wait>0 ? (wc==="low"?"#0FB5A8":wc==="mid"?"#FFC247":"#FF6B5E") : col;
      h += `<circle cx="${sx}" cy="${sy}" r="6.5" fill="${dotCol}" stroke="#fff" stroke-width="1.8"/>`;
      if(a.wait>0){
        h += `<text x="${sx}" y="${sy+3}" text-anchor="middle" font-size="5.5" fill="#fff" font-weight="900" font-family="'Mochiy Pop One',sans-serif">${a.wait}</text>`;
      }
    }
    h += `<title>${a.name}\n待ち: ${a.open?(a.wait+"分"):"休止中"}</title>`;
  });

  // Entrance marker
  const ex=MX(50), ey=MY(93)+4;
  h += `<polygon points="${ex},${ey-10} ${ex-9},${ey+5} ${ex+9},${ey+5}" fill="#E8002D" stroke="#fff" stroke-width="1.5"/>`;
  h += `<text x="${ex}" y="${ey+18}" text-anchor="middle" font-size="8.5" fill="#E8002D" font-weight="700" font-family="'Noto Sans JP',sans-serif">入口</text>`;

  // Current position: wave/star when moved
  if(curPos.x!==50||curPos.y!==93){
    const px=MX(curPos.x), py=MY(curPos.y);
    h += `<circle cx="${px}" cy="${py}" r="8" fill="none" stroke="#FFC72C" stroke-width="2.5" opacity="0.9"/>`;
    h += `<circle cx="${px}" cy="${py}" r="4" fill="#FFC72C"/>`;
  }

  document.getElementById("park-map").innerHTML = h;

  document.getElementById("map-legend").innerHTML =
    Object.entries(LANDS).map(([,l])=>
      `<div class="legend-item"><span class="legend-swatch" style="background:${l.color}"></span>${l.name}</div>`
    ).join('') +
    `<div class="legend-item"><span class="legend-swatch" style="background:#FFC72C;border:1.5px solid #888"></span>次のおすすめ</div>` +
    `<div class="legend-item"><span class="legend-swatch" style="background:#AAA"></span>制覇済み</div>`;
}

function render(){
  const done=state.filter(a=>a.done).length;
  const {plan,total}=buildPlan();

  document.getElementById("stats").innerHTML=`
    <div class="stat hl"><div class="num">${done}<small>/${state.length}</small></div><div class="lbl">制覇</div></div>
    <div class="stat"><div class="num">${Math.floor(total/60)}<small>h</small>${total%60}<small>分</small></div><div class="lbl">残り推定</div></div>
    <div class="stat"><div class="num">${fmtClock(simClock)}</div><div class="lbl">現在(想定)</div></div>
    <div class="stat"><div class="num">${fmtClock(simClock+total)}</div><div class="lbl">全制覇予定</div></div>`;

  const next=nextBest(curPos,state);
  const hero=document.getElementById("hero");
  if(next){
    const w=walkMin(curPos,next);
    const minWait=Math.min(...state.filter(a=>!a.done&&a.open).map(a=>a.wait));
    const why=next.wait<=minWait+5
      ?"今いちばん空いている台。先に回収しておくと終盤がラクになります。"
      :"待ち時間＋移動の合計が最小。近さで稼ぐ一手です。";
    hero.innerHTML=`
      <span class="kicker"><span class="pin"></span>NEXT｜次に乗るべき1台</span>
      <h2>${next.name}</h2>
      <div class="land-tag">${LANDS[next.land].name}</div>
      <div class="metrics">
        <div class="metric"><span class="v wait">${next.wait}<small style="font-size:.5em">分</small></span><span class="k">待ち時間</span></div>
        <div class="metric"><span class="v walk">${w}<small style="font-size:.5em">分</small></span><span class="k">徒歩</span></div>
        <div class="metric"><span class="v">${next.wait+w}<small style="font-size:.5em">分</small></span><span class="k">合計</span></div>
      </div>
      <div class="why">💡 ${why}</div>
      <div class="act">
        <button class="btn btn-primary" id="rideNext">✓ 乗った！（次へ）</button>
        <button class="btn btn-ghost" id="skipNext">スキップ</button>
      </div>`;
    document.getElementById("rideNext").onclick=()=>rideIt(next.id);
    document.getElementById("skipNext").onclick=()=>{ next._skip=true; render(); };
  } else {
    hero.innerHTML=`
      <span class="kicker">🎉 COMPLETE</span>
      <h2 style="margin-top:14px">全アトラクション制覇！</h2>
      <div class="why" style="margin-top:14px">おつかれさまでした！「はじめから」で再挑戦できます。</div>`;
  }

  const planEl=document.getElementById("plan");
  planEl.innerHTML = plan.length
    ? plan.map((p,i)=>`
        <div class="step">
          <div class="ord">${i+1}</div>
          <div class="nm"><b>${p.name}</b><span>${LANDS[p.land].name}・徒歩${p.walk}分＋待ち${p.wait}分</span></div>
          <div class="tm"><b>~${fmtClock(p.atClock)}</b>到着</div>
        </div>`).join('')
    : `<div class="step"><div class="nm"><b>残りなし 🎉</b></div></div>`;

  const byLand={};
  state.forEach(a=>{ (byLand[a.land]=byLand[a.land]||[]).push(a); });
  document.getElementById("lands").innerHTML = Object.keys(LANDS).map(lk=>{
    const arr=byLand[lk]||[]; if(!arr.length) return "";
    const ld=LANDS[lk], doneN=arr.filter(a=>a.done).length;
    return `<div class="land-card">
      <div class="land-h"><span class="dot" style="background:${ld.color}"></span><b>${ld.name}</b><span>${doneN}/${arr.length} 制覇</span></div>
      <div class="grid">${arr.map(a=>`
        <div class="ride${a.done?" done":""}${a.open?"":" closed"}">
          <div class="top">
            <div class="rn">${a.name}</div>
            <div class="wait-box">${a.open
              ?`<div class="w ${waitClass(a.wait)}">${a.wait}</div><div class="u">分待ち</div>`
              :`<div class="closetag">休止中</div>`}</div>
          </div>
          <div class="meta">
            <span class="chip">${a.type==="show"?"シアター":a.type==="walk"?"体験・散策":"ライド"}</span>
            <span class="chip">所要~${a.dur}分</span>
          </div>
          <button class="ridebtn" data-id="${a.id}">${a.done?"✓ 制覇済み（戻す）":"乗った"}</button>
        </div>`).join("")}</div>
    </div>`;
  }).join("");

  document.querySelectorAll(".ridebtn").forEach(b=>{ b.onclick=()=>toggleRide(b.dataset.id); });
  document.getElementById("updated").textContent=`更新: ${new Date().toLocaleTimeString("ja-JP")}（ライブデータ）`;

  renderMap();
}

function rideIt(id){
  const a=state.find(x=>x.id===id); if(!a) return;
  const w=walkMin(curPos,a);
  simClock+=w+a.wait+a.dur;
  a.done=true; curPos={x:a.x,y:a.y};
  render(); refresh();
}
function toggleRide(id){
  const a=state.find(x=>x.id===id); if(!a) return;
  if(a.done){ a.done=false; } else { rideIt(id); return; }
  render();
}
async function refresh(){
  try{ await fetchLiveWaits(); }
  catch(e){ console.warn("ライブデータ取得失敗:",e); simulateWaits(); }
  render();
}
function reset(){
  state.forEach(a=>{a.done=false;a.wait=a.base;a.open=true;});
  curPos={...ENTRANCE}; simClock=0; refresh();
}

document.getElementById("refresh").onclick=refresh;
document.getElementById("reset").onclick=reset;
document.getElementById("walkW").oninput=e=>{
  walkWeight=e.target.value/100;
  document.getElementById("walkWv").textContent="×"+walkWeight.toFixed(1);
  render();
};

refresh();
setInterval(refresh,5*60*1000);
</script>
